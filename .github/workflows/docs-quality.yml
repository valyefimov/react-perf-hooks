name: Docs Quality

on:
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/components/**'
      - 'src/pages/**'
      - 'src/css/**'
      - 'static/**'
      - 'docusaurus.config.ts'
      - 'sidebars.ts'
      - 'tsconfig.docs.json'
      - 'lighthouserc.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/docs-quality.yml'
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/components/**'
      - 'src/pages/**'
      - 'src/css/**'
      - 'static/**'
      - 'docusaurus.config.ts'
      - 'sidebars.ts'
      - 'tsconfig.docs.json'
      - 'lighthouserc.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/docs-quality.yml'

permissions:
  contents: read

jobs:
  lighthouse:
    name: Lighthouse accessibility and performance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@v4.1.0
        with:
          run_install: false

      - name: Setup Node.js 24
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check docs
        run: pnpm docs:type-check

      - name: Build docs
        run: pnpm docs:build

      - name: Run Lighthouse CI
        run: pnpm dlx @lhci/cli@0.15.x autorun --config=./lighthouserc.json
